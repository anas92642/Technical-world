<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ans Technical World</title>
    <style>
        :root {
            --neon-green: #0f0;
            --dark-bg: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--dark-bg);
            color: var(--neon-green);
            overflow: hidden;
        }

        /* --- Login Page --- */
        #login-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        h1.site-title {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--neon-green);
            margin-bottom: 20px;
        }

        .header-img {
            width: 200px;
            border-radius: 10px;
            border: 2px solid var(--neon-green);
            margin-bottom: 30px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        .admin-panel {
            background: rgba(0, 40, 0, 0.8);
            padding: 30px;
            border: 1px solid var(--neon-green);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        input {
            display: block;
            width: 250px;
            padding: 10px;
            margin: 10px 0;
            background: black;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: var(--neon-green);
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: white;
            box-shadow: 0 0 20px white;
        }

        /* --- Loading Overlay --- */
        #loader {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #111;
            border-top: 5px solid var(--neon-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- Main Dashboard --- */
        #main-content {
            display: none;
            height: 100vh;
            position: relative;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: -1;
        }

        .hacker-box {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 40px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--neon-green);
            text-align: center;
            cursor: pointer;
            transition: 0.5s;
            animation: glow 2s infinite alternate;
        }

        .hacker-box:hover {
            transform: translate(-50%, -50%) scale(1.05);
            background: rgba(0, 255, 0, 0.1);
        }

        @keyframes glow {
            from { box-shadow: 0 0 10px var(--neon-green); }
            to { box-shadow: 0 0 30px var(--neon-green); }
        }
    </style>
</head>
<body>

    <div id="login-page">
        <h1 class="site-title"><b>Ans Technical World</b></h1>
        <img src="https://via.placeholder.com/200x120/000000/00FF00?text=TECH+WORLD" alt="Technical World" class="header-img">
        
        <div class="admin-panel">
            <h3>ADMIN ACCESS</h3>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleLogin()">LOGIN</button>
        </div>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p>BYPASSING FIREWALL...</p>
    </div>

    <div id="main-content">
        <canvas id="matrix"></canvas>
        <div class="hacker-box" onclick="alert('Accessing Cybercrime Database...')">
            <h2>SYSTEM BREACHED</h2>
            <p>Welcome to the Ans Technical World</p>
            <p style="font-size: 0.8rem;">[ CLICK TO INITIALIZE ]</p>
        </div>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === "admin" && pass === "anas007") {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('loader').style.display = 'flex';

                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    showDashboard();
                }, 3000); // 3-second loading
            } else {
                alert("Access Denied: Invalid Credentials");
            }
        }

        function showDashboard() {
            document.getElementById('main-content').style.display = 'block';
            
            // 1. Text-to-Speech Welcome
            const msg = new SpeechSynthesisUtterance("Welcome to the Ans Technical World");
            msg.rate = 0.9;
            msg.pitch = 0.5; // Deeper "hacker" voice
            window.speechSynthesis.speak(msg);

            // 2. Start Matrix Background
            initMatrix();
        }

        // Matrix Animation Script
        function initMatrix() {
            const canvas = document.getElementById('matrix');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const words = "ETHICAL CYBERCRIME SECURITY HACKER ANS TECHNICAL WORLD 010101";
            const letters = words.split("");
            const fontSize = 16;
            const columns = canvas.width / fontSize;
            const drops = [];

            for (let i = 0; i < columns; i++) drops[i] = 1;

            function draw() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#0f0";
                ctx.font = fontSize + "px arial";

                for (let i = 0; i < drops.length; i++) {
                    const text = letters[Math.floor(Math.random() * letters.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(draw, 33);
        }
    </script>
</body>
</html>
